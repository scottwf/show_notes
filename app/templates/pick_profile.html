{% extends "layout.html" %}
{% block title %}Who's watching?{% endblock %}

{% block page_content %}
<div class="min-h-screen flex flex-col items-center justify-center px-4 py-16">

  <h1 class="text-4xl font-bold text-slate-100 mb-2 tracking-tight">Who's watching?</h1>
  <p class="text-slate-400 mb-12 text-base">Choose your profile to continue.</p>

  <form method="POST" action="{{ url_for('main.set_profile') }}" id="picker-form">
    <input type="hidden" name="member_id" id="chosen-member-id">
    <input type="hidden" name="next" value="/">

    <div class="flex flex-wrap gap-8 justify-center max-w-2xl">
      {% for member in members %}
      <button type="button"
              class="profile-card group flex flex-col items-center gap-3 p-4 rounded-xl
                     hover:bg-slate-800/60 transition-all duration-200 focus:outline-none
                     focus:ring-2 focus:ring-sky-500 w-32"
              data-id="{{ member.id }}"
              aria-label="Select profile {{ member.display_name }}">

        <!-- Avatar circle -->
        <div class="w-24 h-24 rounded-full flex items-center justify-center text-white text-3xl font-bold
                    shadow-lg ring-4 ring-transparent group-hover:ring-white/30 transition-all duration-200
                    group-focus:ring-white/50"
             style="background-color: {{ member.avatar_color }};">
          {% if member.avatar_url %}
            <img src="{{ member.avatar_url }}" alt="{{ member.display_name }}"
                 class="w-full h-full object-cover rounded-full">
          {% else %}
            {{ member.display_name[0].upper() }}
          {% endif %}
        </div>

        <span class="text-slate-200 font-medium text-sm group-hover:text-white transition-colors truncate w-full text-center">
          {{ member.display_name }}
        </span>
        {% if member.is_default %}
          <span class="text-xs text-slate-500">Primary</span>
        {% endif %}
      </button>
      {% endfor %}

      <!-- Add profile card -->
      <a href="{{ url_for('main.profile') }}#add-profile"
         class="group flex flex-col items-center gap-3 p-4 rounded-xl
                hover:bg-slate-800/60 transition-all duration-200 w-32">
        <div class="w-24 h-24 rounded-full border-2 border-dashed border-slate-600
                    flex items-center justify-center text-slate-500
                    group-hover:border-sky-400 group-hover:text-sky-400 transition-all duration-200">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"/>
          </svg>
        </div>
        <span class="text-slate-400 font-medium text-sm group-hover:text-sky-400 transition-colors text-center">
          Add Profile
        </span>
      </a>
    </div>
  </form>

</div>

<script>
  document.querySelectorAll('.profile-card').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('chosen-member-id').value = btn.dataset.id;
      document.getElementById('picker-form').submit();
    });
  });
</script>
{% endblock %}
